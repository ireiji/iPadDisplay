<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h1>Admin Panel</h1>

<input id="mediaInput" placeholder="Enter video or GIF URL">
<button id="confirmBtn">CONFIRM</button>

<!-- Correct Supabase CDN -->
<script type="module">
  // Import Supabase properly
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const supabaseUrl = "https://iknwqjibynjonuraflxx.supabase.co";
  const supabaseKey = "sb_publishable_C8ohNDrYHdoznd80cSZ9GA__DOubJMV";
  const supabase = createClient(supabaseUrl, supabaseKey);

  async function updateMedia() {
    const url = document.getElementById("mediaInput").value;

    const { error } = await supabase
      .from("media")
      .update({ url: url })
      .eq("id", 1);

    if (error) {
      alert("Error: " + error.message);
    } else {
      alert("Updated!");
    }
  }

  // Connect button to function
  document.getElementById("confirmBtn").addEventListener("click", updateMedia);
</script>

</body>
</html>
