<!DOCTYPE html>
<html>
<head>
  <title>Display</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
    body {
      margin: 0;
      background: black;
    }

    video, img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }
  </style>
</head>
<body>

<div id="container"></div>

<!-- Use type="module" for Supabase JS -->
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const supabaseUrl = "https://iknwqjibynjonuraflxx.supabase.co";
  const supabaseKey = "sb_publishable_C8ohNDrYHdoznd80cSZ9GA__DOubJMV";
  const supabase = createClient(supabaseUrl, supabaseKey);

  const container = document.getElementById("container");

  // Function to render media
  function renderMedia(url) {
    container.innerHTML = '';
    if (!url) {
      container.innerHTML = "<h1 style='color:white'>No media set</h1>";
      return;
    }
    if (url.endsWith('.mp4')) {
      container.innerHTML = `
        <video autoplay loop controls>
          <source src="${url}" type="video/mp4">
        </video>
      `;
    } else {
      container.innerHTML = `<img src="${url}">`;
    }
  }

  // Initial load
  async function loadMedia() {
    const { data } = await supabase
      .from('media')
      .select('*')
      .eq('id', 1)
      .single();
    if (data) renderMedia(data.url);
  }

  loadMedia();

  // Realtime subscription for updates
  supabase
    .channel('media_updates')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'media' }, payload => {
      if (payload.new.id === 1) {
        renderMedia(payload.new.url);
      }
    })
    .subscribe();
</script>

</body>
</html>
